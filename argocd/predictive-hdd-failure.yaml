apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predictive-hdd-failure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mlopslaboratory/predictive-hdd-failure-gitops.git
    targetRevision: main
    path: apps/predictive-hdd-failure/overlays/minikube
  destination:
    server: https://kubernetes.default.svc
    namespace: predictive-hdd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true