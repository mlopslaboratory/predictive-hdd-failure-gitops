apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictive-hdd-api
  namespace: predictive-hdd
  labels:
    app: predictive-hdd-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: predictive-hdd-api
  template:
    metadata:
      labels:
        app: predictive-hdd-api
    spec:
      containers:
        - name: api
          image: predictive-hdd-failure-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20