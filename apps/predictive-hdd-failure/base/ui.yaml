apiVersion: v1
kind: ConfigMap
metadata:
  name: predictive-hdd-ui
  namespace: predictive-hdd
  labels:
    app: predictive-hdd-ui
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        proxy_pass http://predictive-hdd-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Predictive HDD Failure</title>
      <style>
        :root {
          color-scheme: light;
          --bg: #f4f7f9;
          --panel: #ffffff;
          --text: #16202a;
          --muted: #5d6975;
          --border: #d9e1e7;
          --accent: #0f766e;
          --danger: #b42318;
          --ok: #027a48;
        }

        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          color: var(--text);
          background: var(--bg);
        }

        header,
        main {
          width: min(1120px, calc(100% - 32px));
          margin: 0 auto;
        }

        header {
          padding: 24px 0 12px;
          display: flex;
          justify-content: space-between;
          gap: 16px;
          align-items: center;
        }

        h1 {
          margin: 0;
          font-size: 1.6rem;
          line-height: 1.2;
        }

        h2 {
          margin: 0 0 12px;
          font-size: 1rem;
        }

        nav {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
        }

        a,
        button {
          border: 1px solid var(--border);
          border-radius: 6px;
          background: var(--panel);
          color: var(--text);
          padding: 9px 12px;
          font: inherit;
          text-decoration: none;
          cursor: pointer;
        }

        button.primary {
          border-color: var(--accent);
          background: var(--accent);
          color: white;
        }

        main {
          padding: 8px 0 32px;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 14px;
        }

        .panel {
          background: var(--panel);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 16px;
        }

        .wide {
          grid-column: span 2;
        }

        .status {
          font-weight: 700;
        }

        .ok {
          color: var(--ok);
        }

        .error {
          color: var(--danger);
        }

        .muted {
          color: var(--muted);
          font-size: 0.92rem;
        }

        textarea,
        pre {
          width: 100%;
          min-height: 180px;
          border: 1px solid var(--border);
          border-radius: 6px;
          padding: 12px;
          font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
          background: #fbfcfd;
          color: var(--text);
          overflow: auto;
        }

        pre {
          min-height: 120px;
          white-space: pre-wrap;
        }

        table {
          width: 100%;
          border-collapse: collapse;
          font-size: 0.92rem;
        }

        td {
          border-top: 1px solid var(--border);
          padding: 8px 0;
        }

        td:last-child {
          text-align: right;
          font-weight: 700;
        }

        @media (max-width: 860px) {
          header {
            align-items: flex-start;
            flex-direction: column;
          }

          .grid {
            grid-template-columns: 1fr;
          }

          .wide {
            grid-column: span 1;
          }
        }
      </style>
    </head>
    <body>
      <header>
        <div>
          <h1>Predictive HDD Failure</h1>
          <div class="muted">Kubernetes UI for API inference and service checks</div>
        </div>
        <nav>
          <a href="/api/docs">API Docs</a>
          <a href="/api/experiments">Experiments</a>
          <a href="/api/metrics">Metrics</a>
        </nav>
      </header>

      <main class="grid">
        <section class="panel">
          <h2>API Health</h2>
          <div id="health" class="status muted">Loading...</div>
        </section>

        <section class="panel">
          <h2>Model</h2>
          <table>
            <tbody>
              <tr><td>Class</td><td id="model-class">...</td></tr>
              <tr><td>Features</td><td id="feature-count">...</td></tr>
              <tr><td>Window</td><td id="window-size">...</td></tr>
            </tbody>
          </table>
        </section>

        <section class="panel">
          <h2>Drift</h2>
          <div id="drift" class="status muted">Loading...</div>
        </section>

        <section class="panel wide">
          <h2>Prediction Request</h2>
          <textarea id="payload" spellcheck="false">{
      "features": {}
    }</textarea>
          <div style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap;">
            <button class="primary" id="predict">Predict</button>
            <button id="sample">Build zero sample</button>
          </div>
        </section>

        <section class="panel">
          <h2>Prediction Result</h2>
          <pre id="result">No prediction yet.</pre>
        </section>

        <section class="panel wide">
          <h2>Recent Predictions</h2>
          <pre id="history">Loading...</pre>
        </section>
      </main>

      <script>
        const state = { features: [] };

        async function getJson(path) {
          const response = await fetch(path);
          if (!response.ok) {
            throw new Error(`${response.status} ${response.statusText}`);
          }
          return response.json();
        }

        function formatJson(value) {
          return JSON.stringify(value, null, 2);
        }

        async function loadHealth() {
          const node = document.getElementById("health");
          try {
            const data = await getJson("/api/health");
            node.textContent = data.status || "ok";
            node.className = "status ok";
          } catch (error) {
            node.textContent = error.message;
            node.className = "status error";
          }
        }

        async function loadModel() {
          try {
            const data = await getJson("/api/model-info");
            state.features = data.feature_cols || [];
            document.getElementById("model-class").textContent = data.model_class || "n/a";
            document.getElementById("feature-count").textContent = data.features_count ?? "n/a";
            document.getElementById("window-size").textContent = data.preprocessing?.window_size ?? "n/a";
          } catch (error) {
            document.getElementById("model-class").textContent = "error";
            document.getElementById("feature-count").textContent = "error";
            document.getElementById("window-size").textContent = "error";
          }
        }

        async function loadDrift() {
          const node = document.getElementById("drift");
          try {
            const data = await getJson("/api/drift-status");
            if (!data.available) {
              node.textContent = "not available";
              node.className = "status muted";
              return;
            }
            node.textContent = data.any_drift ? "drift detected" : "stable";
            node.className = data.any_drift ? "status error" : "status ok";
          } catch (error) {
            node.textContent = error.message;
            node.className = "status error";
          }
        }

        async function loadHistory() {
          const node = document.getElementById("history");
          try {
            const data = await getJson("/api/predictions");
            node.textContent = data.length ? formatJson(data) : "No predictions in the current API process.";
          } catch (error) {
            node.textContent = error.message;
          }
        }

        function buildZeroSample() {
          const features = {};
          for (const feature of state.features) {
            features[feature] = 0;
          }
          document.getElementById("payload").value = formatJson({ features });
        }

        async function predict() {
          const result = document.getElementById("result");
          try {
            const payload = JSON.parse(document.getElementById("payload").value);
            const response = await fetch("/api/predict", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (!response.ok) {
              throw new Error(formatJson(data));
            }
            result.textContent = formatJson(data);
            await loadHistory();
          } catch (error) {
            result.textContent = error.message;
          }
        }

        document.getElementById("sample").addEventListener("click", buildZeroSample);
        document.getElementById("predict").addEventListener("click", predict);

        Promise.allSettled([loadHealth(), loadModel(), loadDrift(), loadHistory()]);
      </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictive-hdd-ui
  namespace: predictive-hdd
  labels:
    app: predictive-hdd-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: predictive-hdd-ui
  template:
    metadata:
      labels:
        app: predictive-hdd-ui
    spec:
      containers:
        - name: ui
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: ui-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: ui-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: ui-config
          configMap:
            name: predictive-hdd-ui
---
apiVersion: v1
kind: Service
metadata:
  name: predictive-hdd-ui
  namespace: predictive-hdd
  labels:
    app: predictive-hdd-ui
spec:
  type: NodePort
  selector:
    app: predictive-hdd-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
